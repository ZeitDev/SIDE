description: 01 - Highly increased epochs with MultiStepLR and normalized losses

data:
  dataset: data.datasets.EndoVis17

training:
  epochs: 200

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 1.0e-4
      weight_decay: 1.0e-4
    encoder_lr_mod: 1.0

  scheduler:
    name: schedulers.custom.WarmupMultiStepLR
    params:
      warmup_epochs: 10
      milestones: [160, 180]
      gamma: 0.1
      steps_per_epoch: 169
      start_factor: 0.01

  encoder:
    name: models.encoders.timm.Encoder
    params:
      model_name: convnextv2_tiny # atto, femto, pico, nano, tiny, base, large, huge
      pretrained: true

  tasks:
    segmentation:
      enabled: true
      distillation:
        enabled: true
    disparity:
      enabled: true
      distillation:
        enabled: true

  weighting:
    inter:
      name: criterions.weighting.DynamicTaskPriority
      params:
        alpha: 0.2 # Faster reaction
        gamma: 0.3 # Punish winning task more
        metric_key_segmentation: 'performance/validation/segmentation/DICE_score/instrument'
        metric_is_score_segmentation: true
        metric_key_disparity: 'performance/validation/disparity/AbsRel_rate'
        metric_is_score_disparity: false
    intra_segmentation:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.1 # Abandon teacher faster
        teacher_performance: 0.9604
        inverse: false
        metric_key: 'performance/validation/misc/interceptDICE_score'
        metric_is_score: true
    intra_disparity:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.4 # Abandon teacher faster
        teacher_performance: 0.0809
        inverse: false
        metric_key: 'performance/validation/misc/interceptAbsRel_rate'
        metric_is_score: false
