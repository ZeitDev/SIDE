description: Debugging Multi Task Segmentation and Disparity with Knowledge Distillation

data:
  dataset: data.datasets.EndoVis17

training:
  epochs: 25

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 2.0e-4

  scheduler:
    name: torch.optim.lr_scheduler.OneCycleLR
    params:
      max_lr: 2.0e-4
      epochs: 25
      steps_per_epoch: 675
      pct_start: 0.3
      anneal_strategy: cos

  tasks:
    segmentation:
      enabled: true
      knowledge_distillation:
        enabled: true
        name: offline
    disparity:
      enabled: true
      knowledge_distillation:
        enabled: true
        name: offline