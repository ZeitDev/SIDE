description: Debugging Multi Task Segmentation and Disparity with Knowledge Distillation

data:
  dataset: data.datasets.EndoVis17
  max_disparity: 512

training:
  epochs: 250

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 1.0e-4
    encoder_lr_mod: 1.0

  scheduler:
    name: torch.optim.lr_scheduler.LinearLR
    params:
      start_factor: 0.5
      total_iters: 675

  tasks:
    disparity:
      enabled: true
      criterion:
        name: criterions.disparity.MaskedL1Loss
        params: {}
      decoder:
        name: models.decoders.disparity.DisparityDecoder
        params:
          is_stereo: true
          max_disparity: 512
          intercept_at: 4
          intercept_channels: 128 # matching FoundationStereo V'_c logits

logging:
  n_validation_images: 0