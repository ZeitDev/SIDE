description: weighted Multi-Task Knowledge Distillation

data:
  dataset: data.datasets.EndoVis17
  max_disparity: 512

training:
  epochs: 80

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 3.0e-4
    encoder_lr_mod: 1.0

  scheduler:
    name: schedulers.custom.WarmupCosineAnnealingLR
    params:
      warmup_epochs: 1
      total_epochs: 80
      steps_per_epoch: 169
      start_factor: 0.5
      eta_min: 3.0e-7 # lr / 1000

  tasks:
    segmentation:
      enabled: true
      distillation:
        enabled: true
    disparity:
      enabled: true
      distillation:
        enabled: true

  weighting:
    inter:
      name: criterions.weighting.DynamicTaskPriority
      params:
        alpha: 0.2 # Faster reaction
        gamma: 0.3 # Punish winning task more
        metric_key_segmentation: 'performance/validation/segmentation/DICE_score/instrument'
        metric_is_score_segmentation: true
        metric_key_disparity: 'performance/validation/disparity/AbsRel_rate'
        metric_is_score_disparity: false
    intra_segmentation:
      name: criterions.weighting.Uncertainty
      params: {}
    intra_disparity:
      name: criterions.weighting.Uncertainty
      params: {}

