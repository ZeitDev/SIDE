description: Debugging Multi Task Segmentation and Disparity with Knowledge Distillation

data:
  dataset: data.datasets.EndoVis17
  max_disparity: 512

training:
  epochs: 150

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 1.42e-4
    encoder_lr_mod: 1

  scheduler:
    name: schedulers.custom.WarmupCosineAnnealingLR
    params:
      warmup_epochs: 1
      total_epochs: 150
      steps_per_epoch: 675
      start_factor: 0.01
      eta_min: 5.5e-8

  tasks:
    segmentation:
      enabled: true
      distillation:
        enabled: true
    disparity:
      enabled: true
      distillation:
        enabled: true

  weighting:
    inter:
      name: criterions.weighting.DynamicTaskPriority
      params:
        alpha: 0.1
        gamma: 1.0
        metric_key_segmentation: 'performance/validation/segmentation/DICE_score/instrument'
        metric_is_score_segmentation: true
        metric_key_disparity: 'performance/validation/misc/normalized_EPE_px'
        metric_is_score_disparity: false
    intra_segmentation:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.1
        teacher_performance: 0.96
        inverse: false
        metric_key: 'performance/validation/segmentation/DICE_score/instrument'
        metric_is_score: true
    intra_disparity:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.1
        teacher_performance: 22.33
        inverse: false
        metric_key: 'performance/validation/disparity/EPE_px'
        metric_is_score: false
