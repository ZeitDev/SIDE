description: Base configuration

# --- Data Configuration ---
data:
  dataset: data.datasets.EndoVis17
  validation: true

  num_of_classes:
    segmentation: 2
    disparity: 1
  max_disparity: 512

  batch_size:  2
  num_workers: 4
  pin_memory: true

  transforms:
    train:
      - name: CenterCrop
        params:
          height: 1024
          width: 1024
      - name: Resize
        params:
          height: 1024
          width: 1024
      - name: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    test:
      - name: CenterCrop
        params:
          height: 1024
          width: 1024
      - name: Resize
        params:
          height: 1024
          width: 1024
      - name: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]


# --- Training Configuration ---
training:
  epochs: 10

  checkpoint: null # continue training from this checkpoint
  finetune: null # finetune from this pre-trained model with frozen encoder

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 1.0e-3 # decoder and task heads learning rate // [optuna]
    encoder_lr_mod: 0.1 # dont let pretrained encoder explode [optuna]

  scheduler:
    name: torch.optim.lr_scheduler.CosineAnnealingWarmRestarts # [change to cosine annealing with warmup?]
    params:
      T_0: 50
      T_mult: 1
      eta_min: 1.0e-7

  encoder:
    name: models.encoders.timm.Encoder
    params:
      model_name: convnextv2_nano
      pretrained: true

  tasks:
    segmentation:
      enabled: false
      criterion:
        name: monai.losses.DiceCELoss
        params:
          softmax: true
          to_onehot_y: true
          include_background: false
      decoder:
        name: models.decoders.segmentation.SegmentationDecoder
        params: {}
      distillation:
        enabled: false
        name: offline # mlflow
        state: null # debug/260211:1659/train
        criterion:
          name: criterions.segmentation.ChannelWiseKLDivLoss
          params:
            temperature: 4.0

    disparity: 
      enabled: false
      criterion:
        name: criterions.disparity.MaskedL1Loss
        params: {}
      decoder:
        name: models.decoders.disparity.DisparityDecoder
        params:
          is_disparity: true
          max_disparity: 512
          intercept_at: 4
          intercept_channels: 128 # matching FoundationStereo V'_c logits
      distillation:
        enabled: false
        name: offline # models.teachers.foundation_stereo.FoundationStereoWrapper
        state: null
        criterion:
          name: criterions.disparity.PixelWiseKLDivLoss
          params:
            temperature: 1.0

  weighting:
    inter:
      name: criterions.weighting.Unweighted
      params: {}
    intra_segmentation:
      name: criterions.weighting.Unweighted
      params: {}
    intra_disparity:
      name: criterions.weighting.Unweighted
      params: {}

logging:
  log_interval: 0.05
  vram: false
  notebook_mode: false
  n_validation_images: 0