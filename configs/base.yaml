description: Base configuration

general:
  seed: 42
  num_workers: 8
  pin_memory: true

data:
  dataset: data.datasets.EndoVis17

  num_of_classes:
    segmentation: 8 # 7 instrument classes + background
    disparity: 1 # regression task
  max_disparity: 512 # matches FoundationStereo's max disparity
  focal_length_scale_factor: 1.0
  confidence_gate: 0.6 # based on dataset stats

  transforms:
    train:
      - name: CenterCrop
        params:
          height: 1024
          width: 1024
      - name: Resize
        params:
          height: 1024
          width: 1024
      - name: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    test:
      - name: CenterCrop
        params:
          height: 1024
          width: 1024
      - name: Resize
        params:
          height: 1024
          width: 1024
      - name: Normalize
        params:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

# --- Training Configuration ---
training:
  epochs: 1 # just for debugging: 50
  validation: true

  batch_size:  2
  accumulate_grad_batches: 4

  ema_alpha: 0.1 

  checkpoint: null # continue training from this checkpoint, not tested
  finetune: null # finetune from this pre-trained model with frozen encoder, not tested

  optimizer:
    name: torch.optim.AdamW
    params:
      lr: 8.0e-4 # decoder and task heads learning rate // optuna?
      weight_decay: 1.0e-4
    encoder_lr_mod: 0.5 # dont let pretrained encoder explode

  scheduler:
    name: schedulers.custom.WarmupCosineAnnealingLR
    params:
      warmup_epochs: 1 # keep short
      total_epochs: 50 # max epochs
      steps_per_epoch: 169 # 1350 // 2 // 4 
      start_factor: 0.1 # don't shock the pretrained encoder
      eta_min: 8.0e-6 # lr / 100

  encoder:
    name: models.encoders.timm.Encoder
    params:
      model_name: convnextv2_tiny # nano is not enough capacity for distillation | all: atto, femto, pico, nano, tiny, base, large, huge
      pretrained: true # pretrained on ImageNet-1k semantic classification

  tasks:
    segmentation:
      enabled: false
      criterion:
        name: monai.losses.DiceCELoss
        params:
          softmax: true
          to_onehot_y: true # convert class indices to one-hot encoding
          include_background: false # ignore majority class
      decoder:
        name: models.decoders.segmentation.SegmentationDecoder
        params:
          intercept_at: 4 # 1024 // 4 = 256, match SegFormers logits at 256x256 spatial resolution
      distillation:
        enabled: false
        name: offline # 'offline' use logits in harddisk, 'mlflow' use mlflow model uri
        state: null # mflow model uri: debug/260211:1659/train or path to state dict
        criterion:
          name: criterions.segmentation.ChannelWiseKLDivLoss
          params:
            temperature: 3.19 # match 0.7 confidence threshold

    disparity: 
      enabled: false
      criterion:
        name: criterions.disparity.MaskedL1Loss # only consider pixels with valid disparity values
        params: {}
      decoder:
        name: models.decoders.disparity.DisparityDecoder
        params:
          max_disparity: 512 # matches FoundationStereo's max disparity
          intercept_at: 4 # 1024 // 4 = 256, match FoundationStereo V'_c at 256x256 resolution
          intercept_channels: 128 # matching FoundationStereo V'_c logit channels of 128 disparity bins, 512 // 4 = 128
      distillation:
        enabled: false
        name: offline # models.teachers.foundation_stereo.FoundationStereoWrapper
        state: null
        criterion:
          name: criterions.disparity.PixelWiseKLDivLoss
          params:
            temperature: 1.66
            confidence_scaling: true # scale loss by teacher's confidence map

  weighting:
    inter:
      name: criterions.weighting.DynamicTaskPriority
      params:
        alpha: 0.2 # Slower reaction
        gamma: 0.3 # Punish winning task less
        metric_key_segmentation: 'performance/validation/segmentation/DICE_score/instrument_mean'
        metric_is_score_segmentation: true
        metric_key_disparity: 'performance/validation/disparity/AbsRel_rate'
        metric_is_score_disparity: false
    intra_segmentation:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.1 # Abandon teacher slower
        teacher_performance: 0.5486
        inverse: false
        metric_key: 'performance/validation/misc/interceptDICE_score'
        metric_is_score: true
    intra_disparity:
      name: criterions.weighting.CompetenceDecay
      params:
        alpha: 0.1 # Abandon teacher slower
        teacher_performance: 0.0805
        inverse: false
        metric_key: 'performance/validation/misc/interceptAbsRel_rate'
        metric_is_score: false

logging:
  log_interval: 0.05
  vram: false
  notebook_mode: false
  n_validation_images: 0